<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background card -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- Left comparison column -->
  <rect x="20" y="38" width="22" height="44" rx="4" fill="#e2e8f0" opacity="0.9"/>
  <!-- Right comparison column (taller = winner) -->
  <rect x="46" y="26" width="22" height="56" rx="4" fill="#38bdf8"/>
  <!-- Score dot on right column -->
  <circle cx="57" cy="20" r="7" fill="#0ea5e9"/>
  <!-- Checkmark in score dot -->
  <path d="M53.5 20.5 L56 23 L60.5 18" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Base line -->
  <rect x="18" y="83" width="64" height="2.5" rx="1.25" fill="#475569"/>
</svg>
