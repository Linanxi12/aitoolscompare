baseURL: https://aitools-hub.xyz/
locale: en-us
title: AI Tools Compare
theme: PaperMod

enableRobotsTXT: true
enableEmoji: true
paginate: 9
summaryLength: 55

# Google Analytics — replace with your ID when ready
# googleAnalytics: G-XXXXXXXXXX

params:
  env: production
  title: AI Tools Compare
  description: >-
    In-depth, unbiased comparisons of the best AI tools for coding, writing,
    image generation, and more. Save time and money — find the right tool for
    your specific needs.
  keywords:
    - AI tools
    - AI comparison
    - coding AI
    - AI writing
    - AI image generator
    - chatbot comparison
    - Claude vs GPT
  author: AI Tools Compare
  DateFormat: January 2, 2006
  defaultTheme: auto
  disableThemeToggle: false

  # Post display
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  ShowFullTextinRSS: true
  ShowToc: true
  TocOpen: true

  # Home page hero
  homeInfoParams:
    Title: "Compare AI Tools, Make Smarter Choices \U0001F916"
    Content: >-
      In-depth, unbiased comparisons of AI coding assistants, image generators,
      writing tools, and video models — with a <strong>public scoring framework</strong>
      and <strong>cited data sources</strong> for every test.<br><br>
      <span style="display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;font-size:0.9rem;">
      <a href="/posts/" style="text-decoration:none;color:inherit;">📊 <strong>10</strong> Comparisons</a>
      <a href="/categories/" style="text-decoration:none;color:inherit;">📂 <strong>4</strong> Categories</a>
      <a href="/about/#how-we-test" style="text-decoration:none;color:inherit;">🎯 <strong>12</strong> Weighted Dimensions</a>
      <a href="/about/#scoring-framework" style="text-decoration:none;color:inherit;">📝 <strong>1</strong> Public Scoring Framework</a>
      </span>

  # Social links (footer + header)
  socialIcons:
    - name: github
      url: https://github.com/Linanxi12/aitoolscompare
    - name: rss
      url: /index.xml

  # AdSense — replace with your IDs when approved
  # adsense:
  #   client: ca-pub-XXXXXXXXXXXXXXXX
  #   slot: XXXXXXXXXX

  # Schema.org / SEO
  schema:
    type: Organization
    name: AI Tools Compare
    url: https://aitools-hub.xyz/

  # Edit post link (optional)
  editPost:
    URL: https://github.com/Linanxi12/aitoolscompare/blob/main/content
    Text: Suggest Changes
    appendFilePath: true

  # Search (Fuse.js — built into PaperMod)
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys:
      - title
      - permalink
      - summary
      - content

menu:
  main:
    - identifier: posts
      name: All Comparisons
      url: /posts/
      weight: 10
    - identifier: categories
      name: Categories
      url: /categories/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30
    - identifier: about
      name: About
      url: /about/
      weight: 40
    - identifier: contact
      name: Contact
      url: /contact/
      weight: 50

taxonomies:
  category: categories
  tag: tags

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    style: monokai

privacy:
  disqus:
    disable: true
  googleAnalytics:
    disable: false
    respectDoNotTrack: true
  instagram:
    disable: true
  x:
    disable: false
    enableDNT: true
  vimeo:
    disable: true
  youtube:
    disable: false
    privacyEnhanced: true
